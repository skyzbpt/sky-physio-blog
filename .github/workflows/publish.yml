# 自動發佈：後台把 data/articles.json 推上 main 後，
# 這個 workflow 會重建全站靜態頁（文章頁／OG 卡／sitemap／主題頁／RSS／llms）
# 並把結果 commit 回 main，再由 GitHub Pages 部署。
name: publish-site

on:
  push:
    branches: [main]
    paths:
      - 'data/articles.json'
      - 'data/site.json'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安裝中文字型（OG 分享卡渲染用）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra

      - name: 安裝 Playwright（OG 卡截圖用）
        run: |
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: 重建全站
        run: node tools/build.mjs

      - name: Commit 並推回 main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "沒有變更，略過 commit"
          else
            git commit -m "自動發佈：文章更新（由 data/articles.json 重建全站）"
            git pull --rebase origin main
            git push origin main
          fi
