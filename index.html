<style>

.edu-title{font-size:14px;font-weight:700;margin:3px 0}
.edu-desc{font-size:11px;color:var(--slate);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.edu-meta{font-size:10px;color:var(--slate);margin-top:3px}
.day-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;margin-bottom:10px}

.day-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.day-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700}

var _audioCtx=null;
function playNotifySound(){
  try{
    if(!_audioCtx){var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;_audioCtx=new AC();}
    if(_audioCtx.state==='suspended')_audioCtx.resume();
    var ctx=_audioCtx;var now=ctx.currentTime;
    // 雙音「叮咚」：兩個音符
    [{f:880,t:0,d:0.18},{f:1174,t:0.16,d:0.32}].forEach(function(n){
      var osc=ctx.createOscillator();var gain=ctx.createGain();
      osc.type='sine';osc.frequency.value=n.f;
      osc.connect(gain);gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0,now+n.t);
      gain.gain.linearRampToValueAtTime(0.22,now+n.t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,now+n.t+n.d);
      osc.start(now+n.t);osc.stop(now+n.t+n.d);
    });
  }catch(e){}
}

function checkPendingCount(){
  if(!RENDER_URL||!currentUser)return;
  fetch(RENDER_URL+'/pending-submissions').then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(data){
    var bk=((data&&data.bookings)||[]).length;
    var intake=((data&&data.intakes)||[]).length;
    if(_notifyFirstRun){
      // 首次：只記錄基準，不發通知聲（避免登入時舊資料就響）
      _lastSeen.bk=bk;_lastSeen.intake=intake;_notifyFirstRun=false;
    }else{
      if(bk>_lastSeen.bk)addNotify('bk',bk);
      if(intake>_lastSeen.intake)addNotify('intake',intake);
      _lastSeen.bk=bk;_lastSeen.intake=intake;
    }
    _notifyCount.bk=bk;_notifyCount.intake=intake;
    refreshNotifyBell();
  }).catch(function(){});
}
var _notifyTimer=null;
var _notifyFirstRun=true;
function startNotifyPolling(){
  // 預先建立／喚醒音訊（瀏覽器需使用者互動後才能播放，登入動作已滿足）
  try{var AC=window.AudioContext||window.webkitAudioContext;if(AC&&!_audioCtx)_audioCtx=new AC();if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();}catch(e){}
  _notifyFirstRun=true; // 首次檢查不發聲（避免登入就響）
  checkPendingCount();
  if(_notifyTimer)clearInterval(_notifyTimer);
  _notifyTimer=setInterval(checkPendingCount,180000); // 每 3 分鐘檢查一次
}
function notifyTimeAgo(iso){
  var diff=Date.now()-new Date(iso).getTime();
  var m=Math.floor(diff/60000);
  if(m<1)return '剛剛';
  if(m<60)return m+' 分鐘前';
  var h=Math.floor(m/60);
  if(h<24)return h+' 小時前';
  return Math.floor(h/24)+' 天前';
}
function markNotifyRead(id){
  var n=NOTIFY_LOG.find(function(x){return x.id===id;});
  if(n)n.read=true;
  refreshNotifyBell();
  rebuildNotifyPanel();

}
function markAllNotifyRead(){
  NOTIFY_LOG.forEach(function(n){n.read=true;});
  refreshNotifyBell();
  rebuildNotifyPanel();
  if(typeof saveAll==='function')saveAll();
}
function clearNotifyLog(){
  NOTIFY_LOG=[];

}

// 手動同步：匯入 LIFF 線上預約／初診表的填寫，並更新通知面板（點擊面板不關閉）
function reloadNotify(btn){
  if(btn&&btn.tagName){btn.disabled=true;btn.textContent='同步中…';}
  if(!RENDER_URL||!currentUser){if(btn&&btn.tagName){btn.disabled=false;btn.textContent='重新整理';}return;}
  pullSubmissions(true); // 同步並匯入 LIFF 線上預約與初診表的填寫
  setTimeout(function(){
    fetch(RENDER_URL+'/pending-submissions').then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(data){
      var bk=((data&&data.bookings)||[]).length;
      var intake=((data&&data.intakes)||[]).length;
      if(bk>_lastSeen.bk)addNotify('bk',bk);
      if(intake>_lastSeen.intake)addNotify('intake',intake);
      _lastSeen.bk=bk;_lastSeen.intake=intake;
      _notifyCount.bk=bk;_notifyCount.intake=intake;
      refreshNotifyBell();
      rebuildNotifyPanel();
      if(btn&&btn.tagName){btn.disabled=false;btn.textContent='重新整理';}
    }).catch(function(){if(btn&&btn.tagName){btn.disabled=false;btn.textContent='重新整理';}showToast('讀取失敗，請稍後再試');});
  },1500);
}

/* ============ 總覽 ============ */
function calcRetention(){
  var byPhone={};
  BOOKINGS.filter(function(b){return b.status==='completed';}).forEach(function(b){(byPhone[b.phone]=byPhone[b.phone]||[]).push(b.date);});
  var phones=Object.keys(byPhone);
  var returning=phones.filter(function(ph){return byPhone[ph].length>1;}).length;
  var rate=phones.length?Math.round(returning/phones.length*100):0;
  var today=new Date(todayStr());var lapsed=0;
  phones.forEach(function(ph){var last=byPhone[ph].slice().sort().pop();if((today-new Date(last))/86400000>60)lapsed++;});
  return {rate:rate,lapsed:lapsed};
}

function doBackup(){
  try{
    var json=JSON.stringify(buildSnapshot(),null,2);
    var blob=new Blob([json],{type:'application/json'});var url=URL.createObjectURL(blob);
    var d=new Date();var stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0');
    var a=document.createElement('a');a.href=url;a.download='領航備份-'+stamp+'.json';document.body.appendChild(a);a.click();
    setTimeout(function(){if(a.parentNode)a.parentNode.removeChild(a);URL.revokeObjectURL(url);},2000);
    showToast('備份檔已下載');
  }catch(e){showToast('備份失敗：'+e.message);}
}
function restoreBackup(input){
  var file=input.files&&input.files[0];if(!file)return;
  if(!(currentUser&&currentUser.role==='admin')){showToast('僅管理員可還原');input.value='';return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var s;try{s=JSON.parse(e.target.result);}catch(err){showToast('檔案格式錯誤，無法還原');input.value='';return;}
    if(!s||typeof s!=='object'||(!s.PATIENTS&&!s.BOOKINGS&&!s.SERVICES)){showToast('這不是有效的備份檔');input.value='';return;}
    window._restoreSnap=s;
    var info=[];if(s.PATIENTS)info.push('病患 '+s.PATIENTS.length+' 位');if(s.BOOKINGS)info.push('預約 '+s.BOOKINGS.length+' 筆');if(s.SOAP_NOTES)info.push('病歷 '+s.SOAP_NOTES.length+' 份');if(s.PAYMENTS)info.push('消費 '+s.PAYMENTS.length+' 筆');
    var when=s._backupAt?('<div class="t-sub" style="margin-top:8px">備份時間：'+esc(new Date(s._backupAt).toLocaleString('zh-TW',{hour12:false}))+'</div>'):'';
    modal('<div class="modal-head" style="background:var(--warn)">確認還原備份<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="banner" style="background:#fdf3e0;border:1px solid #f0d090;color:#8a5a12"><span>!</span><div>還原會用這個備份檔<b>覆蓋目前所有資料</b>，目前尚未備份的變更將遺失且無法復原。請務必確認。</div></div><div style="font-size:13px;line-height:1.9">備份內容：'+esc(info.join('、')||'（無法判讀筆數）')+when+'</div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" style="background:var(--warn)" onclick="confirmRestore()">確認還原並覆蓋</button></div>');
    input.value='';
  };
  reader.readAsText(file);
}

function autoImportLine(silent){
  try{
    if(!_lineUsers.length){if(!silent)showToast('尚無 LINE 好友資料');return;}
    var updated=0,matched=0,created=0;
    _lineUsers.forEach(function(u){
      var nm=(u.displayName||'').trim();var bound=lineBoundPatient(u.userId);
      if(bound){var changed=false;if(u.pictureUrl&&bound.avatar!==u.pictureUrl){bound.avatar=u.pictureUrl;changed=true;}if(!bound.name&&nm){bound.name=nm;changed=true;}if(changed)updated++;return;}
      if(!nm)return;
      var p=PATIENTS.find(function(x){return !x.lineId&&(x.name||'').trim()===nm;});
      if(p){p.lineId=u.userId;p.line=true;if(u.pictureUrl)p.avatar=u.pictureUrl;matched++;}
      else{PATIENTS.push({phone:'',pid:'P'+Date.now()+Math.floor(Math.random()*1000),name:nm,dob:'',idNum:'',gender:'',line:true,lineId:u.userId,avatar:u.pictureUrl||'',note:'由 LINE 自動導入（待補電話）'});created++;}
    });
    if(!silent){var parts=[];if(created)parts.push('新增 '+created+' 位');if(matched)parts.push('配對 '+matched+' 位');if(updated)parts.push('更新頭貼 '+updated+' 位');showToast(parts.length?'自動導入完成：'+parts.join('、'):'資料皆為最新');}
    else if(created||matched||updated){showToast('LINE 自動同步完成');}
  }catch(e){if(!silent)showToast('自動導入失敗：'+e.message);}
}

/* ============ 排班相關工具 ============ */
function hmToMin(s){var p=String(s||'').split(':');return Number(p[0])*60+(Number(p[1])||0);}
function isLeaveDay(tid,date){var t=THERAPISTS.find(function(x){return x.id===tid;});return !!(t&&t.leaves&&t.leaves.some(function(l){return l.date===date&&(l.allDay===undefined||l.allDay===true);}));}
function hasLeaveConflict(tid,date,startMin,endMin){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t||!t.leaves)return false;return t.leaves.some(function(l){if(l.date!==date)return false;if(l.allDay===undefined||l.allDay===true)return true;var ls=hmToMin(l.startTime),le=hmToMin(l.endTime);return startMin<le&&endMin>ls;});}
function hasSchedule(t){return !!(t.week&&Object.keys(t.week).some(function(k){return t.week[k]&&t.week[k].length;}));}
function isWorkingSlot(tid,ds,m){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t)return false;if(hasLeaveConflict(tid,ds,m,m+15))return false;var wd=new Date(ds+'T00:00:00').getDay();var sh=(t.week&&t.week[wd])||[];return sh.some(function(s){var st=hmToMin(s.start),en=hmToMin(s.end);return st<m+15&&en>m;});}
function isWithinShift(tid,ds,startMin,durMin){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t)return false;if(isLeaveDay(tid,ds))return false;var dur=Number(durMin)||0;var endMin=startMin+Math.max(dur,1);if(hasLeaveConflict(tid,ds,startMin,endMin))return false;if(!hasSchedule(t))return true;var wd=new Date(ds+'T00:00:00').getDay();var sh=(t.week&&t.week[wd])||[];if(!sh.length)return false;return sh.some(function(s){var st=hmToMin(s.start),en=hmToMin(s.end);return startMin>=st&&startMin<en&&endMin<=en;});}
/* 同治療師時段衝突檢查（嬋柔團課 s13 允許多人；excludeId 為改期時排除自己）*/
var GROUP_SVC_IDS=['s13'];
function slotConflict(tid,date,startMin,svcId,excludeId){
  if(GROUP_SVC_IDS.indexOf(svcId)>-1)return null;
  var endMin=startMin+(svcOf(svcId).dur||50);
  var hit=null;
  BOOKINGS.forEach(function(b){
    if(hit)return;
    if(b.id===excludeId)return;
    if(b.t!==tid||b.date!==date)return;
    if(b.status==='cancelled'||b.status==='canceled')return;
    if(GROUP_SVC_IDS.indexOf(b.svc)>-1)return;
    var bs=Number(b.start)||0;var be=bs+(svcOf(b.svc).dur||50);
    if(startMin<be&&bs<endMin)hit=b;
  });
  return hit;
}

function saveBk(id){
  var b=BOOKINGS.find(function(x){return x.id===id;});if(!b)return;
  var newT=document.getElementById('eb-t').value;var newDate=document.getElementById('eb-date').value||b.date;var newSvc=document.getElementById('eb-svc').value;var tv=document.getElementById('eb-time').value;var newStart=b.start;if(tv){var hm=tv.split(':');newStart=Number(hm[0])*60+Number(hm[1]);}
  if(isLeaveDay(newT,newDate)){showToast(tName(newT)+' 於 '+newDate+' 為休假日');return;}
  var dur=svcOf(newSvc).dur;var endMin=newStart+dur;
  if(newStart<480||endMin>1320){showToast('預約時間需在 08:00–22:00 之間');return;}
  if(!isWithinShift(newT,newDate,newStart,dur)){showToast('此時段非 '+tName(newT)+' 的上班時間');return;}
  var confE=slotConflict(newT,newDate,newStart,newSvc,id);
  if(confE){showToast('此時段 '+tName(newT)+' 已有預約（'+confE.name+' '+confE.time+'），請改選其他時段');return;}
  b.name=document.getElementById('eb-name').value||b.name;b.phone=document.getElementById('eb-phone').value||b.phone;b.t=newT;b.svc=newSvc;b.date=newDate;b.start=newStart;if(tv)b.time=tv;b.note=document.getElementById('eb-note').value||'';

  if(statusChanged&&newStatus==='cancelled'&&prev!=='cancelled'){
    if(b.gcalEventId){var evt=b.gcalEventId;b.gcalEventId=null;gcalDelete(evt,null,calIdForBooking(b));}

  }else{
    showToast('已儲存');syncOne(id);
  }
}

  var rc=document.getElementById('coRc').checked;var p=getPatient(b.phone)||{};var it=INTAKE_DATA[b.phone]||{};

}

    }).catch(function(e){showToast('產生圖片失敗：'+e.message);if(btn){btn.disabled=false;btn.textContent='推播 LINE';}});
  });

function setGender(g){_ptGender=g;document.getElementById('g-male').classList.toggle('sel',g==='male');document.getElementById('g-female').classList.toggle('sel',g==='female');}
function submitPt(){var name=document.getElementById('np-name').value.trim();var phone=document.getElementById('np-phone').value.trim();if(!name||!phone){showToast('請填寫姓名與電話');return;}if(getPatient(phone)){showToast('此電話已存在');return;}PATIENTS.push({phone:phone,name:name,dob:document.getElementById('np-dob').value||'',idNum:document.getElementById('np-id').value||'',gender:_ptGender,line:false,lineId:'',note:document.getElementById('np-note').value||''});closeModal();go('patients');showToast('病患已新增');}
function ptDetail(ph){
  var p=getPatient(ph);if(!p)return;var it=INTAKE_DATA[ph];
  var bks=BOOKINGS.filter(function(b){return b.phone===ph;}).sort(function(a,b){return b.date.localeCompare(a.date);});

  modal('<div class="modal-head" style="background:var(--navy)">'+esc(p.name)+' - 病患資料<button class="x" onclick="closeModal()">&times;</button></div>'+
    '<div class="edit-tabs"><button class="edit-tab active" onclick="ptTab(this,\'info\')">基本資料</button><button class="edit-tab" onclick="ptTab(this,\'bk\')">預約紀錄</button><button class="edit-tab" onclick="ptTab(this,\'pay\')">消費記錄</button></div>'+
    '<div class="edit-panel active" id="ptp-info">'+
    (p.avatar?'<div class="row" style="gap:12px;margin-bottom:14px">'+avatarEl(p.name,p.avatar,54)+'<div><div style="font-size:12px;font-weight:700">LINE 頭貼</div><div style="font-size:11px;color:var(--slate)">由 LINE 好友同步取得</div></div></div>':'')+
    '<div class="grid2"><div class="field"><label>姓名</label><input id="pe-name" value="'+esc(p.name)+'"></div><div class="field"><label>電話'+(p.phone?'':' <span style="color:var(--warn)">（待補）</span>')+'</label><input id="pe-phone" value="'+esc(p.phone||'')+'" placeholder="09xx-xxx-xxx"></div></div>'+
    '<div class="grid2"><div class="field"><label>出生年月日</label><input id="pe-dob" type="date" min="1900-01-01" max="'+todayStr()+'" value="'+(p.dob||(it&&it.dob)||'')+'"></div><div class="field"><label>身分證字號</label><input id="pe-id" value="'+esc(p.idNum||(it&&it.idNum)||'')+'" style="font-family:monospace"></div></div>'+
    '<div class="field"><label>LINE User ID</label>'+(p.lineId?'<div class="row" style="gap:6px"><input value="'+esc(p.lineId)+'" readonly style="flex:1;font-family:monospace;font-size:12px;background:var(--navy-l)"><button class="btn sm ghost" onclick="copyText(\''+esc(p.lineId)+'\')">複製</button></div>':'<div class="row" style="gap:6px"><input value="（未綁定）" readonly style="flex:1;color:var(--slate);background:var(--navy-l)"><button class="btn sm gray" onclick="closeModal();lineModal(\''+ph+'\')">綁定</button></div>')+'</div>'+
    '<div class="field"><label>備註</label><textarea id="pe-note" style="height:50px;resize:none">'+esc(p.note||'')+'</textarea></div>'+
    (it?'<div class="banner info"><span>i</span><div>初診主訴：'+esc(it.complaint||'-')+'</div></div>':'')+'</div>'+
    '<div class="edit-panel" id="ptp-bk"><table><thead><tr><th>日期</th><th>服務</th><th>治療師</th><th>狀態</th></tr></thead><tbody>'+bkRows+'</tbody></table></div>'+
    '<div class="edit-panel" id="ptp-pay">'+ptPayPanel(ph)+'</div>'+
    '<div class="modal-foot" style="justify-content:space-between"><button class="btn danger sm" onclick="delPt(\''+ph+'\')">刪除病患</button><div class="row" style="gap:6px"><button class="btn gray" onclick="closeModal()">關閉</button><button class="btn" onclick="savePt(\''+ph+'\')">儲存</button></div></div>');
}
function ptTab(btn,name){btn.parentNode.querySelectorAll('.edit-tab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');['info','bk','pay'].forEach(function(n){var el=document.getElementById('ptp-'+n);if(el)el.classList.toggle('active',n===name);});}
function ptPayPanel(ph){
  var list=PAYMENTS.filter(function(r){return r.phone===ph;}).sort(function(a,b){return (b.paidAt||'').localeCompare(a.paidAt||'');});
  var total=list.reduce(function(a,r){return a+r.amount;},0);
  var payHtml=list.length?('<div class="banner info"><span>i</span><div>累計消費 '+list.length+' 筆，總金額 '+fmtNT(total)+'</div></div><table><thead><tr><th>日期</th><th>服務</th><th>付款</th><th>金額</th></tr></thead><tbody>'+list.map(function(r){return '<tr><td>'+esc(r.date)+'</td><td>'+esc(r.svcName)+'</td><td><span class="tag '+(r.pay==='transfer'?'amber':r.pay==='card'||r.pay==='package'?'mint':'gray')+'">'+(PAY_LABEL[r.pay]||r.pay)+'</span></td><td class="num" style="font-weight:700">'+fmtNT(r.amount)+'</td></tr>';}).join('')+'</tbody></table>'):'<div class="empty">尚無消費記錄</div>';
  return pkgPanelHTML(ph)+'<div style="height:1px;background:var(--line);margin:16px 0"></div><div class="sec-label">消費記錄</div>'+payHtml;
}
function savePt(ph){
  var p=getPatient(ph);if(!p)return;var oldPhone=p.phone;var newPhone=document.getElementById('pe-phone').value.trim();
  if(newPhone&&newPhone!==oldPhone){var dup=PATIENTS.find(function(x){return x!==p&&x.phone===newPhone;});if(dup){showToast('此電話已被其他病患使用');return;}if(oldPhone){BOOKINGS.forEach(function(b){if(b.phone===oldPhone)b.phone=newPhone;});PAYMENTS.forEach(function(r){if(r.phone===oldPhone)r.phone=newPhone;});SOAP_NOTES.forEach(function(n){if(n.phone===oldPhone)n.phone=newPhone;});if(INTAKE_DATA[oldPhone]){INTAKE_DATA[newPhone]=INTAKE_DATA[oldPhone];delete INTAKE_DATA[oldPhone];}if(PT_TAG_DATA[oldPhone]){PT_TAG_DATA[newPhone]=PT_TAG_DATA[oldPhone];delete PT_TAG_DATA[oldPhone];}if(PT_PACKAGES[oldPhone]){PT_PACKAGES[newPhone]=PT_PACKAGES[oldPhone];delete PT_PACKAGES[oldPhone];}}p.phone=newPhone;}
  p.name=document.getElementById('pe-name').value.trim()||p.name;p.dob=document.getElementById('pe-dob').value||p.dob;p.idNum=document.getElementById('pe-id').value||p.idNum;p.note=document.getElementById('pe-note').value||'';
  closeModal();go('patients');showToast('已儲存');
}
function delPt(ph){modal('<div class="modal-head" style="background:var(--danger)">刪除病患<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div style="font-size:14px">確定刪除此病患？預約與病歷不受影響。</div></div><div class="modal-foot"><button class="btn gray" onclick="ptDetail(\''+ph+'\')">取消</button><button class="btn danger" onclick="confirmDelPt(\''+ph+'\')">確定刪除</button></div>');}
function confirmDelPt(ph){var i=PATIENTS.findIndex(function(p){return ptKey(p)===ph;});if(i>-1)PATIENTS.splice(i,1);closeModal();go('patients');showToast('已刪除');}
function lineModal(ph){var p=getPatient(ph);if(!p)return;modal('<div class="modal-head" style="background:#06C755">綁定 LINE<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div style="font-size:13px;margin-bottom:12px">將 <b>'+esc(p.name)+'</b> 與 LINE 好友綁定</div><div class="field"><label>LINE User ID</label><input id="lineUid" value="'+esc(p.lineId||'')+'" placeholder="U1a2b3c..." style="font-family:monospace"></div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" style="background:#06C755" onclick="saveLine(\''+ph+'\')">綁定</button></div>');}
function saveLine(ph){var p=getPatient(ph);if(!p)return;var u=document.getElementById('lineUid').value.trim();if(!u){showToast('請輸入 LINE User ID');return;}p.lineId=u;p.line=true;closeModal();go('patients');showToast('已綁定 LINE');}
function intakeLink(name,ph){
  var p=ph?getPatient(ph):null;var url=LIFF_INTAKE_URL;
  var lineBlock=(p&&p.lineId)?'<div style="background:#f0fff8;border:1px solid #b2f0d8;border-radius:10px;padding:12px 14px;margin-bottom:14px"><div style="font-size:12px;color:#06C755;font-weight:700;margin-bottom:8px">📱 此病患已綁定 LINE，可直接推播</div><button class="btn" style="background:#06C755;width:100%" onclick="sendIntakeLine(\''+esc(ph)+'\')">推播初診表連結到 LINE</button></div>':(ph?'<div style="background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--slate)">此病患尚未綁定 LINE，請用下方連結手動傳送</div>':'');
  modal('<div class="modal-head" style="background:var(--navy)">發送初診問卷<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div style="font-size:13px;margin-bottom:12px">傳送初診問卷給 <b>'+esc(name)+'</b></div>'+lineBlock+'<div class="sec-label">問卷連結</div><div style="background:var(--navy-l);border-radius:10px;padding:12px;font-size:12px;word-break:break-all;font-family:monospace">'+esc(url)+'</div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">關閉</button><button class="btn ghost" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+url+'\');showToast(\'已複製連結\')">複製連結</button></div>');
}
function sendIntakeLine(ph){var p=getPatient(ph);if(!p||!p.lineId){showToast('此病患未綁定 LINE');return;}var url=LIFF_INTAKE_URL;var msg='【領航物理治療所】\n'+p.name+' 您好 👋\n為了讓首次療程更順利，請於就診前填寫初診問卷：\n\n👉 '+url+'\n\n約需 3 分鐘，感謝您的配合！';sendLineMsg(p.lineId,msg,function(){closeModal();});}
function viewIntake(ph){var d=INTAKE_DATA[ph];if(!d){showToast('找不到問卷');return;}var rows=[['姓名',d.name],['電話',d.phone],['出生年月日',d.dob],['性別',d.gender==='male'?'男':d.gender==='female'?'女':''],['主訴',d.complaint],['持續時間',d.duration],['疼痛強度',(d.vas||0)+' 分'],['患處',(d.bodyParts||[]).join('、')]];modal('<div class="modal-head" style="background:var(--navy)">初診問卷 - '+esc(d.name)+'<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body">'+rows.map(function(r){return r[1]?'<div class="status-row"><span style="color:var(--slate);min-width:90px">'+r[0]+'</span><span style="font-weight:600;text-align:right">'+esc(r[1])+'</span></div>':'';}).join('')+'</div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">關閉</button></div>');}
function tagModal(ph){var p=getPatient(ph);if(!p)return;modal('<div class="modal-head" style="background:var(--navy)">'+esc(p.name)+' - 標籤<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div id="tagList"></div><div style="height:1px;background:var(--line);margin:14px 0"></div><div class="sec-label">新增標籤</div><div class="row" style="gap:8px"><input id="ntName" placeholder="標籤名稱" style="flex:1;padding:9px;border:1.5px solid var(--mist);border-radius:8px;outline:none"><input id="ntColor" type="color" value="#3b82f6" style="width:40px;height:36px;border:1.5px solid var(--mist);border-radius:8px"><button class="btn sm" onclick="addTag(\''+ph+'\')">新增</button></div></div><div class="modal-foot"><button class="btn" onclick="closeModal();go(\'patients\')">完成</button></div>');renderTagList(ph);}
function renderTagList(ph){var tags=getTags(ph);document.getElementById('tagList').innerHTML=ALL_PT_TAGS.map(function(t){var on=tags.indexOf(t.id)>-1;return '<div class="row" style="gap:8px;padding:6px 0;border-bottom:1px solid var(--line)"><button onclick="toggleTag(\''+ph+'\',\''+t.id+'\')" style="width:24px;height:24px;border:1.5px solid '+t.color+';border-radius:6px;background:'+(on?t.color:'#fff')+';color:#fff;cursor:pointer;flex-shrink:0">'+(on?'&check;':'')+'</button><input type="color" value="'+t.color+'" onchange="editTagColor(\''+t.id+'\',this.value,\''+ph+'\')" style="width:30px;height:30px;border:1.5px solid var(--mist);border-radius:6px;padding:0;flex-shrink:0;cursor:pointer"><input value="'+esc(t.name)+'" oninput="editTagName(\''+t.id+'\',this.value)" style="flex:1;font-weight:600;border:1.5px solid var(--mist);border-radius:7px;padding:7px 9px;outline:none"><button class="shift-del" onclick="delTag(\''+t.id+'\',\''+ph+'\')" style="flex-shrink:0">&times;</button></div>';}).join('');}
function editTagName(id,val){var t=PT_TAG_MAP[id];if(t)t.name=val;var a=ALL_PT_TAGS.find(function(x){return x.id===id;});if(a)a.name=val;}
function editTagColor(id,val,ph){var t=PT_TAG_MAP[id];if(t)t.color=val;var a=ALL_PT_TAGS.find(function(x){return x.id===id;});if(a)a.color=val;renderTagList(ph);}
function toggleTag(ph,tid){var tags=getTags(ph);var i=tags.indexOf(tid);if(i>-1)tags.splice(i,1);else tags.push(tid);renderTagList(ph);}
function addTag(ph){var n=document.getElementById('ntName').value.trim();if(!n)return;var c=document.getElementById('ntColor').value;var id='c'+Date.now();ALL_PT_TAGS.push({id:id,name:n,color:c});PT_TAG_MAP[id]={id:id,name:n,color:c};getTags(ph).push(id);document.getElementById('ntName').value='';renderTagList(ph);}
function delTag(tid,ph){var i=ALL_PT_TAGS.findIndex(function(t){return t.id===tid;});if(i>-1)ALL_PT_TAGS.splice(i,1);delete PT_TAG_MAP[tid];Object.keys(PT_TAG_DATA).forEach(function(k){var a=PT_TAG_DATA[k];var j=a.indexOf(tid);if(j>-1)a.splice(j,1);});renderTagList(ph);}
/* 病患課程 */
function pkgPanelHTML(ph){var list=getPkgs(ph);var rows=list.length?list.map(function(p){var left=p.total-p.used;var svcLabel=(p.svcs&&p.svcs.length)?p.svcs.map(function(id){return svcOf(id).name;}).join('、'):svcOf(p.svc).name;return '<div style="padding:10px 0;border-bottom:1px solid var(--line)"><div class="row" style="justify-content:space-between;gap:8px"><div style="min-width:0;flex:1"><div style="font-weight:700;font-size:13px">'+esc(p.name)+'</div><div class="t-sub">'+esc(svcLabel)+'　每堂認列 '+fmtNT(p.unitPrice)+'</div></div><span class="tag '+(left>0?'mint':'gray')+'" style="flex-shrink:0">剩 '+left+' / '+p.total+' 堂</span></div><div class="row" style="gap:6px;margin-top:8px"><button class="btn sm ghost" onclick="editPkgSessionsModal(\''+ph+'\','+p.id+')">編輯堂數</button><button class="btn sm danger" onclick="delPtPkgModal(\''+ph+'\','+p.id+')">刪除課程</button></div></div>';}).join(''):'<div class="empty" style="padding:18px">尚無購買課程</div>';return '<div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px"><div class="sec-label" style="margin:0">課程堂數</div><button class="btn sm" onclick="buyPkgModal(\''+ph+'\')">購買課程</button></div>'+rows;}
function buyPkgModal(ph){var p=getPatient(ph);if(!p)return;if(!PACKAGES.length){showToast('請先到「服務與課程」建立課程方案');return;}var opts=PACKAGES.map(function(k){return '<option value="'+k.id+'">'+esc(k.name)+'（'+pkgSvcLabel(k)+' '+k.sessions+'堂 / '+fmtNT(k.price)+'）</option>';}).join('');modal('<div class="modal-head" style="background:var(--navy)">購買課程 - '+esc(p.name)+'<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="field"><label>選擇課程方案</label><select id="bp-pkg">'+opts+'</select></div><div class="banner info"><span>i</span><div>採每次上課認列一堂：購買當下不計營收，之後每次結帳選「使用課程」扣 1 堂、當次才認列金額。</div></div></div><div class="modal-foot"><button class="btn gray" onclick="ptDetail(\''+ph+'\')">返回</button><button class="btn" onclick="confirmBuyPkg(\''+ph+'\')">確認購買</button></div>');}
function confirmBuyPkg(ph){var p=getPatient(ph);if(!p)return;var k=PACKAGES.find(function(x){return String(x.id)===String(document.getElementById('bp-pkg').value);});if(!k){showToast('請選擇課程');return;}getPkgs(ph).push({id:++PT_PKG_ID,pkgId:k.id,name:k.name,svcs:pkgSvcs(k).slice(),anySvc:!!k.anySvc,total:k.sessions,used:0,unitPrice:k.sessions?Math.round(k.price/k.sessions):0,purchasedAt:todayStr()});saveAll();showToast('已購買「'+k.name+'」'+k.sessions+' 堂');reopenPtPay(ph);}
function reopenPtPay(ph){ptDetail(ph);var tabs=document.querySelectorAll('#modalBox .edit-tab');if(tabs[2])tabs[2].click();}
function editPkgSessionsModal(ph,pid){
  var p=getPkgs(ph).find(function(x){return x.id===pid;});if(!p)return;
  modal('<div class="modal-head" style="background:var(--navy)">編輯課程堂數<button class="x" onclick="reopenPtPay(\''+ph+'\')">&times;</button></div>'+
    '<div class="modal-body"><div style="background:var(--mint-l);border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:13px"><b>'+esc(p.name)+'</b></div>'+
    '<div class="grid2"><div class="field"><label>總堂數</label><input id="ep-total" type="number" min="1" value="'+p.total+'"></div><div class="field"><label>已用堂數</label><input id="ep-used" type="number" min="0" value="'+p.used+'"></div></div>'+
    '<div class="field"><label>每堂認列金額 (NT$)</label><input id="ep-unit" type="number" min="0" step="50" value="'+p.unitPrice+'"></div>'+
    '<div class="banner info"><span>i</span><div>調整堂數不會更動已產生的消費記錄。剩餘堂數＝總堂數－已用堂數，已用堂數不可大於總堂數。</div></div></div>'+
    '<div class="modal-foot"><button class="btn gray" onclick="reopenPtPay(\''+ph+'\')">取消</button><button class="btn" onclick="saveEditPkgSessions(\''+ph+'\','+pid+')">儲存</button></div>');
}
function saveEditPkgSessions(ph,pid){
  var p=getPkgs(ph).find(function(x){return x.id===pid;});if(!p)return;
  var total=Math.max(1,Math.floor(Number(document.getElementById('ep-total').value)||1));
  var used=Math.max(0,Math.floor(Number(document.getElementById('ep-used').value)||0));
  var unit=Math.max(0,Number(document.getElementById('ep-unit').value)||0);
  if(used>total){showToast('已用堂數不可大於總堂數');return;}
  p.total=total;p.used=used;p.unitPrice=unit;
  saveAll();reopenPtPay(ph);showToast('課程堂數已更新');
}
function delPtPkgModal(ph,pid){
  var p=getPkgs(ph).find(function(x){return x.id===pid;});if(!p)return;var left=p.total-p.used;
  modal('<div class="modal-head" style="background:var(--danger)">刪除課程<button class="x" onclick="reopenPtPay(\''+ph+'\')">&times;</button></div>'+
    '<div class="modal-body"><div class="banner" style="background:#fdecec;border:1px solid #f5b5b5;color:#b02525"><span>!</span><div>確定刪除課程「<b>'+esc(p.name)+'</b>」？<br>目前尚有 <b>'+left+'</b> 堂未使用，刪除後<b>無法復原</b>。<br>（不影響已產生的消費記錄與營收）</div></div></div>'+
    '<div class="modal-foot"><button class="btn gray" onclick="reopenPtPay(\''+ph+'\')">取消</button><button class="btn danger" onclick="confirmDelPtPkg(\''+ph+'\','+pid+')">確定刪除</button></div>');
}
function confirmDelPtPkg(ph,pid){var list=getPkgs(ph);var i=list.findIndex(function(x){return x.id===pid;});if(i>-1)list.splice(i,1);saveAll();reopenPtPay(ph);showToast('課程已刪除');}

  var first=Number(notes[0].vas),last=Number(notes[n-1].vas),diff=last-first;var trendTxt=diff<0?'疼痛下降 '+Math.abs(diff)+' 分 ✓':diff>0?'疼痛上升 '+diff+' 分':'疼痛持平';var trendColor=diff<0?'#22c55e':diff>0?'#ef4444':'#6b8a9c';

      var byPt={};tNotes.forEach(function(n){var k=n.phone||n.name;(byPt[k]=byPt[k]||[]).push(n);});

      return head+inner+'</div>';
    }).join('');
  }
  return shell('soap','SOAP 病歷',body,'<div class="row" style="gap:8px"><div class="search-wrap"><input id="soapq" placeholder="搜尋個案姓名或電話" value="'+esc(soapQuery)+'" oninput="filterSoap(this.value)"><button class="s-clear" onclick="filterSoap(\'\')">&times;</button></div><button class="btn sm" onclick="addSoapModal()">+ 新增病歷</button></div>');
};

/* ============ 營運分析（月/季/年比較 + 治療師）============ */
var _anaMode='month',_anaT='__all__',_anaOffset=0,_topT=null;
function setAnaMode(m){_anaMode=m;_anaOffset=0;go('analytics');}
function setAnaT(t){_anaT=t;go('analytics');}
function anaNav(d){if(d>0&&_anaOffset>=0)return;_anaOffset+=d;go('analytics');}
function quarterOf(m){return Math.floor((m-1)/3);}
function anaPeriod(offset){
  var now=new Date();var y=now.getFullYear(),m=now.getMonth()+1;
  if(_anaMode==='month'){var idx=(y*12+(m-1))+offset;var yy=Math.floor(idx/12),mm=idx%12+1;var last=new Date(yy,mm,0).getDate();return {from:yy+'-'+String(mm).padStart(2,'0')+'-01',to:yy+'-'+String(mm).padStart(2,'0')+'-'+String(last).padStart(2,'0'),label:yy+' 年 '+mm+' 月'};}
  if(_anaMode==='quarter'){var q0=quarterOf(m);var qIdx=(y*4+q0)+offset;var qy=Math.floor(qIdx/4),qq=qIdx%4;var sm=qq*3+1,em=qq*3+3;var last=new Date(qy,em,0).getDate();return {from:qy+'-'+String(sm).padStart(2,'0')+'-01',to:qy+'-'+String(em).padStart(2,'0')+'-'+String(last).padStart(2,'0'),label:qy+' 年 Q'+(qq+1)+'（'+sm+'-'+em+' 月）'};}
  var yy2=y+offset;return {from:yy2+'-01-01',to:yy2+'-12-31',label:yy2+' 年'};
}
function anaAgg(period){
  var rows=PAYMENTS.filter(function(p){if(p.date<period.from||p.date>period.to)return false;if(_anaT!=='__all__'&&p.t!==_anaT)return false;return true;});
  var rev=rows.reduce(function(a,p){return a+(p.amount||0);},0);var count=rows.length;var avg=count?Math.round(rev/count):0;
  var svc={};rows.forEach(function(p){var k=p.svc||p.svcName;if(!svc[k])svc[k]={name:p.svcName||svcOf(p.svc).name,count:0,rev:0};svc[k].count++;svc[k].rev+=(p.amount||0);});
  var byT={};rows.forEach(function(p){if(!byT[p.t])byT[p.t]={count:0,rev:0};byT[p.t].count++;byT[p.t].rev+=(p.amount||0);});
  return {rev:rev,count:count,avg:avg,svc:svc,byT:byT};
}
function deltaTag(cur,prev){if(prev===0)return cur>0?'<span class="tag green">新增</span>':'<span class="tag gray">—</span>';var pct=Math.round((cur-prev)/prev*100);if(pct>0)return '<span class="tag green">▲ '+pct+'%</span>';if(pct<0)return '<span class="tag" style="background:#fdecec;color:#e05c5c">▼ '+Math.abs(pct)+'%</span>';return '<span class="tag gray">持平</span>';}
function topClientsByTherapist(tid,from,to){var map={};PAYMENTS.filter(function(p){if(p.t!==tid)return false;if(from&&p.date<from)return false;if(to&&p.date>to)return false;return true;}).forEach(function(p){var k=p.phone||p.name;if(!map[k])map[k]={name:p.name,phone:p.phone,visits:0,amount:0};map[k].visits++;map[k].amount+=(p.amount||0);});return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.amount-a.amount||b.visits-a.visits;}).slice(0,10);}

  return '<div class="card"><div class="card-head"><h3>治療師常客 TOP 10</h3><div class="row" style="gap:5px">'+(period?'<span class="t-sub">'+esc(period.label)+'</span>':'')+pills+'</div></div><div class="card-body flush"><table><thead><tr><th style="text-align:center">名次</th><th>常客</th><th>到診次數</th><th>消費總金額</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';

views.analytics=function(){
  var cur=anaPeriod(_anaOffset);var prev=anaPeriod(_anaOffset-1);var aCur=anaAgg(cur);var aPrev=anaAgg(prev);
  var modePills=[['month','月'],['quarter','季'],['year','年']].map(function(m){return '<button class="cal-pill'+(_anaMode===m[0]?' active':'')+'" onclick="setAnaMode(\''+m[0]+'\')">'+m[1]+'</button>';}).join('');
  var tPills='<button class="cal-pill'+(_anaT==='__all__'?' active':'')+'" onclick="setAnaT(\'__all__\')">全部</button>'+THERAPISTS.map(function(t){var sel=_anaT===t.id;return '<button class="cal-pill'+(sel?' active':'')+'" style="'+(sel?'background:'+tColor(t.id)+';border-color:'+tColor(t.id)+';color:#fff;':'')+'" onclick="setAnaT(\''+t.id+'\')"><span class="cal-dot" style="background:'+(sel?'rgba(255,255,255,.7)':tColor(t.id))+'"></span>'+esc(t.name)+'</button>';}).join('');
  var cmpCards='<div class="stat-grid"><div class="stat-card highlight"><div class="sc-n mint">'+fmtNT(aCur.rev)+'</div><div class="sc-l">營收　'+deltaTag(aCur.rev,aPrev.rev)+'</div></div><div class="stat-card"><div class="sc-n">'+aCur.count+'</div><div class="sc-l">交易筆數　'+deltaTag(aCur.count,aPrev.count)+'</div></div><div class="stat-card"><div class="sc-n">'+fmtNT(aCur.avg)+'</div><div class="sc-l">客單價　'+deltaTag(aCur.avg,aPrev.avg)+'</div></div><div class="stat-card"><div class="sc-n" style="font-size:18px;line-height:1.5;padding-top:4px">'+fmtNT(aPrev.rev)+'</div><div class="sc-l">上期營收<br><span style="font-size:10px">'+esc(prev.label)+'</span></div></div></div>';
  var svcArr=Object.keys(aCur.svc).map(function(k){return aCur.svc[k];}).sort(function(a,b){return b.rev-a.rev;});
  var maxC=Math.max.apply(null,svcArr.map(function(s){return s.count;}).concat([1]));
  var svcRows=svcArr.length?svcArr.map(function(s){return '<div class="bar-row"><div class="bl">'+esc(s.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(s.count/maxC*100)+'%;background:var(--navy)">'+s.count+'</div></div><div class="bv">'+fmtNT(s.rev)+'</div></div>';}).join(''):'<div class="empty">此期間無資料</div>';
  var tCompare='';
  if(_anaT==='__all__'){var tRows=THERAPISTS.map(function(t){var c=(aCur.byT[t.id]||{rev:0,count:0});var pv=(aPrev.byT[t.id]||{rev:0,count:0});return '<tr><td class="t-name"><span class="cal-dot" style="background:'+tColor(t.id)+';display:inline-block;margin-right:6px"></span>'+esc(t.name)+'</td><td>'+c.count+' 次</td><td class="num">'+fmtNT(c.rev)+'</td><td>'+deltaTag(c.rev,pv.rev)+'</td></tr>';}).join('');tCompare='<div class="card"><div class="card-head"><h3>治療師營收對比</h3><span class="t-sub">vs '+esc(prev.label)+'</span></div><div class="card-body flush"><table><thead><tr><th>治療師</th><th>本期次數</th><th>本期營收</th><th>較上期</th></tr></thead><tbody>'+tRows+'</tbody></table></div></div>';}
  return shell('analytics','營運分析',
    '<div class="card"><div class="card-body" style="padding:14px 18px"><div class="row" style="justify-content:space-between;gap:10px;flex-wrap:wrap"><div class="row" style="gap:6px;align-items:center"><span class="sw-label">期間</span>'+modePills+'</div><div class="row" style="background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px;gap:4px"><button onclick="anaNav(-1)" style="width:26px;height:26px;border:none;background:none;border-radius:6px;font-size:16px;color:var(--slate)">&lsaquo;</button><span style="font-size:13px;font-weight:700;min-width:150px;text-align:center">'+esc(cur.label)+'</span><button onclick="anaNav(1)"'+(_anaOffset>=0?' disabled':'')+' style="width:26px;height:26px;border:none;background:none;border-radius:6px;font-size:16px;color:var(--slate);opacity:'+(_anaOffset>=0?'.3':'1')+'">&rsaquo;</button></div></div><div class="row" style="gap:5px;margin-top:12px;flex-wrap:wrap"><span class="sw-label">治療師</span>'+tPills+'</div></div></div>'+
    cmpCards+'<div class="card"><div class="card-head"><h3>服務營收 / 筆數</h3><span class="t-sub">'+esc(cur.label)+'</span></div><div class="card-body">'+svcRows+'</div></div>'+tCompare+topClientsCard(cur));
};

/* ============ 消費記錄（每日篩選）============ */
var _payFilter={pay:'all',date:''};
function payFiltered(){return PAYMENTS.filter(function(r){if(_payFilter.pay!=='all'&&r.pay!==_payFilter.pay)return false;if(_payFilter.date&&r.date!==_payFilter.date)return false;return true;}).sort(function(a,b){return (b.paidAt||'').localeCompare(a.paidAt||'');});}
function setPayDate(d){_payFilter.date=d;go('payments');}
function clearPayDate(){_payFilter.date='';go('payments');}
function setPayFilter(p){_payFilter.pay=p;go('payments');}
function filterPayRows(q){q=(q||'').toLowerCase();document.querySelectorAll('#payBody tr').forEach(function(tr){tr.style.display=tr.textContent.toLowerCase().indexOf(q)>-1?'':'none';});}
views.payments=function(){
  var list=payFiltered();var total=list.reduce(function(a,r){return a+r.amount;},0);var byPay={cash:0,transfer:0,card:0};list.forEach(function(r){byPay[r.pay]=(byPay[r.pay]||0)+r.amount;});
  var rows=list.map(function(r){var pinfo=r.pay==='transfer'&&r.transferLast5?'<div class="t-sub">末五碼 '+esc(r.transferLast5)+(r.transferDate?' / '+esc(r.transferDate):'')+'</div>':'';var rcBtn=r.pay==='package'?'':'<button class="btn sm ghost" onclick="reprintReceipt('+r.bookingId+')">收據</button>';var noteCell=r.note?'<span style="font-size:12px">'+esc(r.note)+'</span>':'<span class="t-sub">—</span>';return '<tr><td><div class="t-name">'+esc(r.name)+'</div><div class="t-sub">'+esc(r.phone)+'</div></td><td>'+esc(r.svcName)+'</td><td>'+esc(tName(r.t))+'</td><td><span class="tag '+(r.pay==='transfer'?'amber':r.pay==='card'||r.pay==='package'?'mint':'gray')+'">'+(PAY_LABEL[r.pay]||r.pay)+'</span>'+pinfo+'</td><td class="num" style="font-weight:700">'+fmtNT(r.amount)+'</td><td>'+noteCell+'</td><td class="t-sub">'+esc(r.paidAt)+'</td><td class="row" style="gap:5px">'+rcBtn+'<button class="btn sm danger" onclick="voidPayment('+r.id+')">作廢</button></td></tr>';}).join('');
  var pills=[['all','全部'],['cash','現金'],['transfer','匯款'],['card','刷卡']].map(function(p){return '<button class="pay-pill'+(_payFilter.pay===p[0]?' sel':'')+'" onclick="setPayFilter(\''+p[0]+'\')">'+p[1]+'</button>';}).join('');
  var dateLabel=_payFilter.date?('（'+_payFilter.date+'）'):'（全部）';
  return shell('payments','消費記錄',
    '<div class="stat-grid"><div class="stat-card highlight"><div class="sc-n mint">'+fmtNT(total)+'</div><div class="sc-l">收款總額'+dateLabel+'</div></div><div class="stat-card"><div class="sc-n">'+list.length+'</div><div class="sc-l">交易筆數</div></div><div class="stat-card"><div class="sc-n">'+fmtNT(byPay.cash)+'</div><div class="sc-l">現金</div></div><div class="stat-card"><div class="sc-n">'+fmtNT(byPay.transfer+byPay.card)+'</div><div class="sc-l">匯款＋刷卡</div></div></div>'+
    '<div class="card"><div class="card-head" style="gap:10px"><div class="row" style="gap:6px">'+pills+'</div><div class="row" style="gap:8px;flex-wrap:wrap"><div class="row" style="gap:5px;align-items:center"><span style="font-size:12px;color:var(--slate);white-space:nowrap">每日</span><input type="date" value="'+esc(_payFilter.date)+'" onchange="setPayDate(this.value)" class="'+(_payFilter.date?'':'date-empty')+'" data-ph="選擇日期" style="padding:8px 10px;border:1.5px solid var(--mist);border-radius:8px;outline:none">'+(_payFilter.date?'<button class="btn sm gray" onclick="clearPayDate()">清除</button>':'')+'</div><div class="search-wrap"><input id="payq" placeholder="搜尋姓名或電話" oninput="filterPayRows(this.value)"><button class="s-clear" onclick="document.getElementById(\'payq\').value=\'\';filterPayRows(\'\')">&times;</button></div></div></div>'+
    '<div class="card-body flush"><table><thead><tr><th>病患</th><th>服務</th><th>治療師</th><th>付款方式</th><th>金額</th><th>備註</th><th>結帳時間</th><th></th></tr></thead><tbody id="payBody">'+rows+'</tbody></table>'+(list.length?'':'<div class="empty">尚無消費記錄，結帳完成後會自動產生。</div>')+'</div></div>');
};
function reprintReceipt(bookingId){var b=BOOKINGS.find(function(x){return x.id===bookingId;});var pay=PAYMENTS.find(function(x){return x.bookingId===bookingId;});if(!b){if(pay)b={name:pay.name,phone:pay.phone,t:pay.t,svc:pay.svc,date:pay.date,time:pay.time||'',pay:pay.pay,transferLast5:pay.transferLast5,transferDate:pay.transferDate,paidAmount:pay.amount};else{showToast('找不到記錄');return;}}var p=getPatient(b.phone)||{};if(pay)b.paidAmount=pay.amount;showReceipt(b,b.name,p.dob||'',p.idNum||'');}
function voidPayment(pid){var r=PAYMENTS.find(function(x){return x.id===pid;});if(!r)return;modal('<div class="modal-head" style="background:var(--danger)">作廢消費記錄<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div style="font-size:14px;line-height:1.9">確定作廢這筆收款？<br><b>'+esc(r.name)+'</b>　'+esc(r.svcName)+'　'+fmtNT(r.amount)+'<br><span style="font-size:12px;color:var(--slate)">作廢後自營收與印花稅扣除；對應預約會還原為「已確認」。</span></div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn danger" onclick="confirmVoidPayment('+pid+')">確定作廢</button></div>');}
function confirmVoidPayment(pid){var i=PAYMENTS.findIndex(function(x){return x.id===pid;});if(i>-1){var r=PAYMENTS[i];var b=BOOKINGS.find(function(x){return x.id===r.bookingId;});if(b&&b.status==='completed'){b.status='confirmed';b.transferLast5='';b.transferDate='';}if(r.pay==='package'){var pk=getPkgs(r.phone).find(function(x){return x.id===r.pkgId;});if(pk&&pk.used>0)pk.used--;}PAYMENTS.splice(i,1);}closeModal();go('payments');showToast('已作廢');saveAll();}

/* ============ 員工薪資（含輸出明細）============ */
views.payroll=function(){
  var rows=THERAPISTS.map(function(t){var bks=BOOKINGS.filter(function(b){return b.t===t.id&&b.status==='completed';});var comm=bks.reduce(function(a,b){return a+getRate(t.id,b.svc);},0);var total=t.base+comm;var cfg=SERVICES.filter(function(s){return getRate(t.id,s.id)>0;});var sub=cfg.length?('抽成設定：'+cfg.map(function(s){return esc(s.name)+' '+fmtNT(getRate(t.id,s.id));}).join('、')):'尚未設定抽成';return '<tr><td><div class="t-name">'+t.name+'</div><div class="t-sub" style="margin-top:2px">'+sub+'</div></td><td class="num">'+fmtNT(t.base)+'</td><td>'+bks.length+' 次</td><td class="num">'+fmtNT(comm)+'</td><td class="num" style="font-weight:700;color:var(--mint-d)">'+fmtNT(total)+'</td><td><button class="btn sm ghost" onclick="payrollModal(\''+t.id+'\')">設定</button></td></tr>';}).join('');
  return shell('payroll','員工薪資','<div class="card"><div class="card-body flush"><table><thead><tr><th>治療師 / 抽成設定</th><th>底薪</th><th>完成次數</th><th>抽成金額</th><th>應發薪資</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div class="banner info"><span>i</span><div>「抽成金額」＝每項服務設定金額 × 已完成次數，因此有完成療程前顯示 NT$0。</div></div>','<button class="btn sm" onclick="payrollExportModal()">輸出薪資明細</button>');
};
function payrollModal(tid){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t)return;if(!T_SVC_RATES[tid])T_SVC_RATES[tid]={};var svcRows=SERVICES.map(function(s){return '<tr><td class="t-name">'+esc(s.name)+'</td><td class="t-sub">'+s.dur+'分 / '+fmtNT(s.price)+'</td><td style="white-space:nowrap">NT$ <input id="pr-'+s.id+'" type="number" min="0" step="50" value="'+getRate(tid,s.id)+'" style="width:90px;padding:6px;border:1.5px solid var(--mist);border-radius:7px;text-align:right"></td></tr>';}).join('')||'<tr><td colspan="3" class="empty">尚無服務項目</td></tr>';modal('<div class="modal-head" style="background:'+tColor(tid)+'">'+t.name+' - 薪資設定<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="field"><label>底薪 (NT$)</label><input id="pr-base" type="number" value="'+t.base+'"></div><div class="sec-label">各服務抽成金額（每完成一次 NT$）</div><table><thead><tr><th>服務</th><th>時長/售價</th><th>抽成金額</th></tr></thead><tbody>'+svcRows+'</tbody></table></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" onclick="savePayroll(\''+tid+'\')">儲存</button></div>');}
function savePayroll(tid){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t)return;t.base=Number(document.getElementById('pr-base').value)||0;if(!T_SVC_RATES[tid])T_SVC_RATES[tid]={};SERVICES.forEach(function(s){var el=document.getElementById('pr-'+s.id);if(el)T_SVC_RATES[tid][s.id]=Math.max(0,Number(el.value)||0);});closeModal();go('payroll');showToast('薪資設定已儲存');}
function payrollRowsFor(tid,from,to){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t)return null;var bks=BOOKINGS.filter(function(b){if(b.t!==tid||b.status!=='completed')return false;if(from&&b.date<from)return false;if(to&&b.date>to)return false;return true;}).sort(function(a,b){return a.date.localeCompare(b.date);});var detail=bks.map(function(b){return {date:b.date,name:b.name,svc:svcOf(b.svc).name,rate:getRate(tid,b.svc)};});var comm=detail.reduce(function(a,d){return a+d.rate;},0);return {t:t,detail:detail,count:bks.length,comm:comm,total:t.base+comm};}
function payrollExportModal(){var tOpts=THERAPISTS.map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+'</option>';}).join('');var d=new Date();var ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');var first=ym+'-01';var last=ym+'-'+String(new Date(d.getFullYear(),d.getMonth()+1,0).getDate()).padStart(2,'0');modal('<div class="modal-head" style="background:var(--navy)">輸出薪資明細<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="field"><label>治療師</label><select id="px-t"><option value="__all__">全部治療師</option>'+tOpts+'</select></div><div class="grid2"><div class="field"><label>起始日期</label><input id="px-from" type="date" value="'+first+'"></div><div class="field"><label>結束日期</label><input id="px-to" type="date" value="'+last+'"></div></div><div style="font-size:11px;color:var(--slate)">明細包含期間內每筆已完成療程、抽成、底薪與應發合計。</div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" onclick="doPayrollExport()">產生明細</button></div>');}
function doPayrollExport(){

  var targets=tid==='__all__'?THERAPISTS.map(function(t){return t.id;}):[tid];var period=(from||'起始')+' ～ '+(to||'迄今');
  var sections=targets.map(function(id){var r=payrollRowsFor(id,from,to);if(!r)return '';var detailRows=r.detail.length?r.detail.map(function(d){return '<tr><td>'+esc(d.date)+'</td><td>'+esc(d.name)+'</td><td>'+esc(d.svc)+'</td><td style="text-align:right">'+fmtNT(d.rate)+'</td></tr>';}).join(''):'<tr><td colspan="4" style="text-align:center;color:#888;padding:14px">此期間無完成療程</td></tr>';return '<div class="pr-block"><h3 style="font-size:16px;margin-bottom:2px">'+esc(r.t.name)+'　<span style="font-size:12px;color:#666;font-weight:400">'+esc(r.t.title)+'</span></h3><table class="pr-table"><thead><tr><th>日期</th><th>個案</th><th>服務</th><th style="text-align:right">抽成</th></tr></thead><tbody>'+detailRows+'</tbody></table><div class="pr-sum"><div class="pr-line"><span>完成療程</span><span>'+r.count+' 次</span></div><div class="pr-line"><span>抽成小計</span><span>'+fmtNT(r.comm)+'</span></div><div class="pr-line"><span>底薪</span><span>'+fmtNT(r.t.base)+'</span></div><div class="pr-line pr-total"><span>應發薪資</span><span>'+fmtNT(r.total)+'</span></div></div></div>';}).join('');
  var css='*{box-sizing:border-box;margin:0;padding:0}'+"body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;padding:28px;color:#1f3a47;background:#fff}"+'.pr-head{text-align:center;border-bottom:2px solid #1a4d68;padding-bottom:14px;margin-bottom:20px}.pr-head h1{font-size:20px;color:#1a4d68}.pr-head .sub{font-size:12px;color:#666;margin-top:4px}.pr-block{margin-bottom:28px;page-break-inside:avoid}.pr-table{width:100%;border-collapse:collapse;margin:10px 0}.pr-table th{background:#f0f5f7;text-align:left;padding:8px 10px;font-size:12px;color:#555;border-bottom:1px solid #dce6ec}.pr-table td{padding:7px 10px;font-size:13px;border-bottom:1px solid #eef3f6}.pr-sum{margin-top:8px;border-top:2px solid #1a4d68;padding-top:8px;max-width:280px;margin-left:auto}.pr-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}.pr-total{font-size:16px;font-weight:900;color:#1f9e7e;border-top:1px solid #dce6ec;margin-top:4px;padding-top:6px}@media print{body{padding:0}}';
  var auto='<scr'+'ipt>window.addEventListener("load",function(){setTimeout(function(){window.print();},500);});</scr'+'ipt>';
  var html='<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>薪資明細</title><style>'+css+'</style></head><body><div class="pr-head"><h1>'+esc(CLINIC_INFO.name)+' · 薪資明細</h1><div class="sub">期間：'+esc(period)+'　|　產生日期：'+todayStr()+'</div></div>'+sections+auto+'</body></html>';
  try{var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();setTimeout(function(){if(a.parentNode)a.parentNode.removeChild(a);URL.revokeObjectURL(url);},3000);closeModal();showToast('已開啟明細新分頁，可列印或存 PDF');}catch(e){showToast('輸出失敗：'+e.message);}
}

function eduCards(){var data=eduFilter==='全部'?EDU_DATA:EDU_DATA.filter(function(e){return e.cat===eduFilter;});if(!data.length)return '<div class="empty">尚無衛教內容，點右上角「新增內容」建立。</div>';return '<div class="edu-list">'+data.map(function(e){var video=e.type==='video';var col=video?'var(--navy)':'var(--danger)';return '<div class="edu-row"><div class="edu-icon" style="color:'+col+';background:'+col+'15">'+eduIcon(e.type)+'</div><div class="edu-body"><div class="row" style="gap:6px"><span class="edu-badge" style="color:'+col+';background:'+col+'15">'+(video?'影片':'PDF')+'</span><span style="font-size:10px;color:var(--mint-d);font-weight:700">'+esc(e.cat)+'</span></div><div class="edu-title">'+esc(e.title)+'</div>'+(e.desc?'<div class="edu-desc">'+esc(e.desc)+'</div>':'')+'<div class="edu-meta row" style="gap:10px">'+(e.url?'<a href="'+esc(e.url)+'" target="_blank" rel="noopener" style="color:var(--mint-d);font-size:11px;text-decoration:none;font-weight:600">🔗 開啟連結</a>':'')+(sentCount(e.id)?'<span>已傳送 '+sentCount(e.id)+' 位</span>':'<span>尚未傳送</span>')+'</div></div><button class="btn sm" onclick="sendEduModal('+e.id+')">傳送給病患</button></div>';}).join('')+'</div>';}

function rmCat(i){var el=document.getElementById('catrow-'+i);if(el)el.remove();}
function addCat(){var v=document.getElementById('newCat').value.trim();if(!v)return;var list=document.getElementById('catList');var i=_catRowSeq++;var row=document.createElement('div');row.className='shift-row';row.id='catrow-'+i;row.innerHTML='<input class="shift-name" style="flex:1;border-left:3px solid var(--mint)" value="'+esc(v)+'"><button class="shift-del" onclick="rmCat('+i+')">&times;</button>';list.appendChild(row);document.getElementById('newCat').value='';}
function saveCats(){var items=document.querySelectorAll('#catList .shift-name');var news=['全部'];items.forEach(function(el){var v=el.value.trim();if(v)news.push(v);});if(news.length<2){showToast('至少保留一個分類');return;}EDU_CATS=news;if(EDU_CATS.indexOf(eduFilter)<0)eduFilter='全部';closeModal();go('education');showToast('分類已儲存');}
var _euType='video';
function addEduModal(){_euType='video';var cOpts=EDU_CATS.filter(function(c){return c!=='全部';}).map(function(c){return '<option>'+c+'</option>';}).join('');modal('<div class="modal-head" style="background:var(--navy)">新增衛教內容<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="pay-pills" style="margin-bottom:14px"><button class="pay-pill sel" id="eu-tv" onclick="setEuType(\'video\')">影片</button><button class="pay-pill" id="eu-pdf" onclick="setEuType(\'pdf\')">PDF</button></div><div class="field"><label>標題</label><input id="eu-title"></div><div class="field"><label>連結 <span id="eu-lbl" style="color:var(--mint-d)">(影片網址，必填)</span></label><input id="eu-url" placeholder="https://..."></div><div class="field"><label>說明（選填）</label><textarea id="eu-desc" style="height:50px;resize:none"></textarea></div><div class="field"><label>分類</label><select id="eu-cat">'+cOpts+'</select></div></div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" onclick="saveEdu()">新增</button></div>');}
function setEuType(t){_euType=t;document.getElementById('eu-tv').classList.toggle('sel',t==='video');document.getElementById('eu-pdf').classList.toggle('sel',t==='pdf');var lbl=document.getElementById('eu-lbl');if(lbl)lbl.textContent=t==='video'?'(影片網址，必填)':'(PDF 連結，選填)';}
function saveEdu(){var title=document.getElementById('eu-title').value.trim();if(!title){showToast('請填寫標題');return;}var url=document.getElementById('eu-url').value.trim();if(_euType==='video'&&!url){showToast('影片請填寫連結網址');return;}EDU_DATA.push({id:++EDU_ID,type:_euType,title:title,cat:document.getElementById('eu-cat').value||EDU_CATS[1],url:url,desc:document.getElementById('eu-desc').value||'',createdAt:todayStr()});closeModal();go('education');showToast('已新增');}
function sendEduModal(id){var e=EDU_DATA.find(function(x){return x.id===id;});if(!e)return;if(!PATIENTS.length){showToast('尚無病患可傳送');return;}var sent=(EDU_SENT[id]||[]).map(function(r){return r.phone;});var rows=PATIENTS.map(function(p){var key=ptKey(p);var done=sent.indexOf(key)>-1;var sub=p.phone?esc(p.phone):(p.lineId?'LINE 好友（未填電話）':'未綁定 LINE');return '<div class="row" style="gap:10px;padding:9px 0;border-bottom:1px solid var(--line)"><input type="checkbox" class="sendchk" value="'+esc(key)+'" data-name="'+esc(p.name)+'"'+(done?' checked disabled':'')+' style="width:16px;height:16px"><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(p.name)+'</div><div style="font-size:11px;color:var(--slate)">'+sub+'</div></div>'+(p.lineId?'<span class="tag green" style="background:#06C75522;color:#06C755">LINE</span>':'<span class="tag gray">未綁 LINE</span>')+(done?'<span class="tag mint">已傳送</span>':'')+'</div>';}).join('');modal('<div class="modal-head" style="background:var(--navy)">傳送衛教內容<button class="x" onclick="closeModal()">&times;</button></div><div class="modal-body"><div style="background:var(--navy-l);border-radius:10px;padding:12px;margin-bottom:14px"><div style="font-weight:700">'+esc(e.title)+'</div><div style="font-size:11px;color:var(--slate)">'+esc(e.cat)+'</div></div><div class="sec-label">選擇病患</div><label class="row" style="gap:8px;font-size:13px;margin-bottom:6px"><input type="checkbox" onchange="document.querySelectorAll(\'.sendchk:not(:disabled)\').forEach(function(c){c.checked=event.target.checked;})" style="width:16px;height:16px"> 全選</label>'+rows+'</div><div class="modal-foot"><button class="btn gray" onclick="closeModal()">關閉</button><button class="btn" onclick="confirmSend('+id+')">標記已傳送</button></div>');}
function confirmSend(id){var sel=Array.prototype.slice.call(document.querySelectorAll('.sendchk:checked:not(:disabled)'));if(!sel.length){showToast('請選擇至少一位病患');return;}var e=EDU_DATA.find(function(x){return x.id===id;});if(!e)return;if(!EDU_SENT[id])EDU_SENT[id]=[];var now=new Date().toLocaleString('zh-TW',{hour12:false}).slice(0,16);var lineCount=0,noLine=0;sel.forEach(function(c){EDU_SENT[id].push({phone:c.value,name:c.dataset.name,sentAt:now});var p=getPatient(c.value);if(p&&p.lineId){var msg='【領航物理治療所｜衛教分享】\n'+e.title+(e.desc?'\n'+e.desc:'')+(e.url?'\n\n👉 '+e.url:'');sendLineMsg(p.lineId,msg);lineCount++;}else{noLine++;}});closeModal();go('education');var tip='已標記傳送給 '+sel.length+' 位';if(lineCount)tip+='，其中 '+lineCount+' 位已推播 LINE';if(noLine)tip+='，'+noLine+' 位未綁定 LINE';showToast(tip);}

/* ============ 排班設定 ============ */
var schedT=(THERAPISTS[0]&&THERAPISTS[0].id)||'Sky';
var DOW_N=['日','一','二','三','四','五','六'];
var DOW_O=[1,2,3,4,5,6,0];
function ensureWeek(t){if(!t.week)t.week={};return t.week;}
function ensureLeaves(t){if(!t.leaves)t.leaves=[];return t.leaves;}
function setSchedT(tid){schedT=tid;go('schedule');}
function addShift(tid,day){var t=THERAPISTS.find(function(x){return x.id===tid;});ensureWeek(t);if(!t.week[day])t.week[day]=[];syncShifts(tid);t.week[day].push({name:'時段'+(t.week[day].length+1),start:'09:00',end:'13:00'});go('schedule');}
function rmShift(tid,day,i){var t=THERAPISTS.find(function(x){return x.id===tid;});syncShifts(tid);t.week[day].splice(i,1);if(!t.week[day].length)delete t.week[day];go('schedule');}
function toggleOff(tid,day){var t=THERAPISTS.find(function(x){return x.id===tid;});ensureWeek(t);syncShifts(tid);if(t.week[day]&&t.week[day].length)delete t.week[day];else t.week[day]=[{name:'早班',start:'09:00',end:'13:00'}];go('schedule');}
function syncShifts(tid){var t=THERAPISTS.find(function(x){return x.id===tid;});if(!t||!t.week)return;DOW_O.forEach(function(day){var sh=t.week[day];if(!sh)return;sh.forEach(function(s,i){var nm=document.getElementById('ws-'+day+'-'+i+'-n');var st=document.getElementById('ws-'+day+'-'+i+'-s');var en=document.getElementById('ws-'+day+'-'+i+'-e');if(nm&&nm.value)s.name=nm.value.trim();if(st)s.start=st.value;if(en)s.end=en.value;});});}
function saveSched(tid){var t=THERAPISTS.find(function(x){return x.id===tid;});syncShifts(tid);t.workDays=Object.keys(t.week).map(Number).filter(function(d){return t.week[d]&&t.week[d].length;});go('schedule');showToast(t.name+' 排班已儲存');}
function addLeave(tid){syncShifts(tid);var t=THERAPISTS.find(function(x){return x.id===tid;});ensureLeaves(t);var date=document.getElementById('lv-date').value;var reason=document.getElementById('lv-reason').value.trim();var allDayCb=document.getElementById('lv-allday');var allDay=!allDayCb||allDayCb.checked;var startTime=!allDay?(document.getElementById('lv-start').value||'09:00'):'';var endTime=!allDay?(document.getElementById('lv-end').value||'18:00'):'';if(!date){showToast('請選擇休假日期');return;}if(!allDay&&startTime>=endTime){showToast('結束時間必須晚於開始時間');return;}if(allDay&&t.leaves.some(function(l){return l.date===date&&(l.allDay===undefined||l.allDay===true);})){showToast('該日期已有全天休假');return;}t.leaves.push({date:date,allDay:allDay,startTime:startTime,endTime:endTime,reason:reason});t.leaves.sort(function(a,b){return a.date.localeCompare(b.date)||((a.startTime||'').localeCompare(b.startTime||''));});go('schedule');showToast('已新增'+(allDay?'全天':'時段')+'休假');}
function rmLeave(tid,idx){syncShifts(tid);var t=THERAPISTS.find(function(x){return x.id===tid;});ensureLeaves(t);if(idx>=0&&idx<t.leaves.length)t.leaves.splice(idx,1);go('schedule');showToast('已移除休假');}
function toggleLeaveTime(cb){var show=!cb.checked;['lv-start','lv-dash','lv-end'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display=show?'':'none';});}
function leaveRows(t){ensureLeaves(t);if(!t.leaves.length)return '<div class="empty">尚無特別休假日</div>';return t.leaves.map(function(l,i){var d=new Date(l.date+'T00:00:00');var w=DOW_N[d.getDay()];var isAllDay=l.allDay===undefined||l.allDay===true;var timeStr=isAllDay?'全天':((l.startTime||'--')+'–'+(l.endTime||'--'));return '<div class="row" style="justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)"><div class="row" style="gap:10px"><span class="day-badge" style="background:'+(isAllDay?'var(--danger)':'var(--warn)')+'">'+(isAllDay?'假':'段')+'</span><div><div style="font-weight:700">'+l.date+' （週'+w+'）<span class="tag '+(isAllDay?'amber':'mint')+'" style="margin-left:6px;font-size:10px">'+esc(timeStr)+'</span></div>'+(l.reason?'<div style="font-size:11px;color:var(--slate)">'+esc(l.reason)+'</div>':'')+'</div></div><button class="shift-del" onclick="rmLeave(\''+t.id+'\','+i+')">&times;</button></div>';}).join('');}
views.schedule=function(){
  var t=THERAPISTS.find(function(x){return x.id===schedT;})||THERAPISTS[0];if(!t)return shell('schedule','排班設定','<div class="empty">尚無治療師</div>');ensureWeek(t);ensureLeaves(t);
  var pills=THERAPISTS.map(function(th){var sel=th.id===schedT;return '<button class="cal-pill'+(sel?' active':'')+'" style="'+(sel?'background:'+tColor(th.id)+';border-color:'+tColor(th.id)+';color:#fff;':'')+'" onclick="setSchedT(\''+th.id+'\')"><span class="cal-dot" style="background:'+(sel?'rgba(255,255,255,.7)':tColor(th.id))+'"></span>'+th.name+'</button>';}).join('');
  var cards=DOW_O.map(function(day){var sh=t.week[day]||[];var off=!sh.length;var c=tColor(t.id);var rows=sh.map(function(s,i){return '<div class="shift-row"><input id="ws-'+day+'-'+i+'-n" class="shift-name" value="'+esc(s.name)+'" style="border-left:3px solid '+c+'"><input id="ws-'+day+'-'+i+'-s" type="time" class="shift-time" value="'+s.start+'"><span style="color:var(--slate)">-</span><input id="ws-'+day+'-'+i+'-e" type="time" class="shift-time" value="'+s.end+'"><button class="shift-del" onclick="rmShift(\''+t.id+'\','+day+','+i+')">&times;</button></div>';}).join('');return '<div class="day-card'+(off?' off':'')+'"><div class="day-head"><div class="day-title"><span class="day-badge" style="background:'+(off?'var(--mist)':c)+'">'+DOW_N[day]+'</span>週'+DOW_N[day]+'</div><div class="row" style="gap:6px">'+(off?'<button class="btn sm ghost" onclick="toggleOff(\''+t.id+'\','+day+')">設為上班</button>':'<button class="btn sm ghost" onclick="addShift(\''+t.id+'\','+day+')">+ 時段</button><button class="btn sm gray" onclick="toggleOff(\''+t.id+'\','+day+')">休診</button>')+'</div></div>'+(off?'<div style="color:var(--slate);font-size:13px">休診</div>':rows)+'</div>';}).join('');
  var workN=DOW_O.filter(function(d){return (t.week[d]||[]).length;}).length;
  return shell('schedule','排班設定','<div class="card"><div class="card-head"><h3><span class="cal-dot" style="background:'+tColor(t.id)+';display:inline-block;margin-right:6px"></span>'+t.name+' 每週班表</h3><div class="row" style="gap:8px"><span class="tag mint">每週 '+workN+' 天</span><button class="btn sm" onclick="saveSched(\''+t.id+'\')">儲存排班</button></div></div><div class="card-body">'+cards+'</div></div>'+
    '<div class="card"><div class="card-head"><h3>特別休假日</h3><span class="tag amber">'+t.leaves.length+' 天</span></div><div class="card-body"><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center"><input id="lv-date" type="date" min="'+todayStr()+'" max="2100-12-31" onchange="this.classList.toggle(\'date-empty\',!this.value)" class="date-empty" data-ph="選擇休假日期" style="padding:9px 11px;border:1.5px solid var(--mist);border-radius:8px;outline:none"><label class="row" style="gap:5px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer"><input type="checkbox" id="lv-allday" checked onchange="toggleLeaveTime(this)" style="width:auto;cursor:pointer"> 全天</label><input id="lv-start" type="time" value="09:00" style="display:none;padding:9px 10px;border:1.5px solid var(--mist);border-radius:8px;outline:none"><span id="lv-dash" style="display:none;color:var(--slate);font-weight:700">–</span><input id="lv-end" type="time" value="18:00" style="display:none;padding:9px 10px;border:1.5px solid var(--mist);border-radius:8px;outline:none"><input id="lv-reason" placeholder="事由（選填）" style="flex:1;min-width:120px;padding:9px 11px;border:1.5px solid var(--mist);border-radius:8px;outline:none"><button class="btn sm" onclick="addLeave(\''+t.id+'\')">+ 新增</button></div><div id="leaveList">'+leaveRows(t)+'</div><div class="banner info" style="margin-top:14px"><span>i</span><div>特別休假日優先於每週班表；設定後該日於預約行事曆會以紅點標示為休診。</div></div></div></div>',
    '<div class="row" style="gap:5px">'+pills+'</div>');
};

views.packages=function(){
  var sRows=SERVICES.map(function(s){var tsLabel=(s.ts&&s.ts.length)?s.ts.map(function(id){return tName(id);}).join('、'):'全部治療師';return '<tr><td class="t-name">'+esc(s.name)+'</td><td>'+s.dur+' 分</td><td class="num">'+fmtNT(s.price)+'</td><td class="t-sub">'+esc(tsLabel)+'</td><td class="row" style="gap:5px"><button class="btn sm ghost" onclick="editSvcModal(\''+s.id+'\')">編輯</button><button class="btn sm danger" onclick="delSvc(\''+s.id+'\')">刪除</button></td></tr>';}).join('');

  var pkgCard='<div class="card"><div class="card-head"><h3>課程方案（堂數套餐）</h3><button class="btn sm" onclick="addPkgModal()">+ 新增課程</button></div><div class="card-body"><div class="pkg-grid">'+cards+'<div class="pkg-card pkg-add" onclick="addPkgModal()"><div style="font-size:30px;font-weight:300">+</div><div>新增課程</div></div></div></div></div>';
  return shell('packages','服務與課程',svcCard+pkgCard,'<button class="btn ghost sm" onclick="publishCatalogModal()">發布到線上預約</button>');
};
function publishCatalogModal(){
  if(!SERVICES.length){showToast('請先建立服務項目');return;}
  var svcSel=PUBLISHED_SVC_IDS!=null?PUBLISHED_SVC_IDS:SERVICES.map(function(s){return s.id;});
  var pkgSel=PUBLISHED_PKG_IDS!=null?PUBLISHED_PKG_IDS.map(String):PACKAGES.map(function(p){return String(p.id);});

  var pkgRows=PACKAGES.length?PACKAGES.map(function(p){var on=pkgSel.indexOf(String(p.id))>-1;return '<label style="display:flex;align-items:center;gap:9px;padding:8px 2px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line)"><input type="checkbox" class="pub-pkg" value="'+p.id+'"'+(on?' checked':'')+' style="width:16px;height:16px;flex-shrink:0;accent-color:var(--mint);cursor:pointer"><span style="flex:1">'+esc(p.name)+'</span><span style="color:var(--slate);flex-shrink:0">'+p.sessions+'堂 / '+fmtNT(p.price)+'</span></label>';}).join(''):'<div class="empty" style="padding:14px">尚無課程</div>';
  modal('<div class="modal-head" style="background:var(--navy)">發布到線上預約<button class="x" onclick="closeModal()">&times;</button></div>'+

function doPublishCatalog(){
  var svc=[];document.querySelectorAll('.pub-svc:checked').forEach(function(c){svc.push(c.value);});
  var pkg=[];document.querySelectorAll('.pub-pkg:checked').forEach(function(c){pkg.push(c.value);});
  if(!svc.length){showToast('請至少選擇一項服務，線上預約才有可預約的項目');return;}
  PUBLISHED_SVC_IDS=svc;PUBLISHED_PKG_IDS=pkg;
  closeModal();publishCatalog();saveAll();
}
function publishCatalog(){
  if(!RENDER_URL){showToast('請先設定 RENDER_URL');return;}
  var svcSel=PUBLISHED_SVC_IDS!=null?PUBLISHED_SVC_IDS:SERVICES.map(function(s){return s.id;});
  var pkgSel=PUBLISHED_PKG_IDS!=null?PUBLISHED_PKG_IDS.map(String):PACKAGES.map(function(p){return String(p.id);});
  var pubSvcs=SERVICES.filter(function(s){return svcSel.indexOf(s.id)>-1;});
  var pubPkgs=PACKAGES.filter(function(p){return pkgSel.indexOf(String(p.id))>-1;});
  var cat={services:pubSvcs.map(function(s){return {id:s.id,name:s.name,dur:s.dur,price:s.price,desc:s.desc||'',ts:s.ts||[]};}),therapists:THERAPISTS.map(function(t){return {id:t.id,name:t.name,title:t.title||'',color:tColor(t.id),week:t.week||{},leaves:t.leaves||[]};}),packages:pubPkgs.map(function(p){return {id:p.id,name:p.name,svcs:pkgSvcs(p),sessions:p.sessions,price:p.price,desc:p.desc||'',ts:p.ts||[]};})};
  showToast('發布中…');
  fetch(RENDER_URL+'/publish-catalog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cat)}).then(function(r){if(r.ok)showToast('已發布 '+pubSvcs.length+' 項服務、'+pubPkgs.length+' 項課程 ✓');else showToast('發布失敗：HTTP '+r.status);}).catch(function(e){showToast('發布失敗：'+e.message);});
}

function stampUploadBox(label,type,tid){
  var cur=tid?STAMP_T[tid]:STAMPS[type];var key=tid?('t-'+tid):type;
  var shape=tid?'長方形':(type==='clinic'?'橢圓形':type==='owner'?'長方形':'正方形');
  var preview=cur?'<img src="'+cur+'" style="width:64px;height:64px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff">':'<div style="width:64px;height:64px;border:1.5px dashed var(--mist);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:11px">無</div>';
  return '<div class="row" style="gap:12px;padding:12px 0;border-bottom:1px solid var(--line)">'+preview+'<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(label)+'</div><div style="font-size:11px;color:var(--slate)">建議去背 PNG，'+shape+'</div></div><div class="row" style="gap:5px"><label class="btn sm ghost" style="cursor:pointer">上傳<input type="file" accept="image/*" style="display:none" onchange="uploadStamp(this,\''+key+'\')"></label>'+(cur?'<button class="btn sm danger" onclick="clearStamp(\''+key+'\')">移除</button>':'')+'</div></div>';
}
views.receipt=function(){
  var sample={name:'（範例）王小明',svc:(SERVICES[0]?SERVICES[0].id:''),t:(THERAPISTS[0]?THERAPISTS[0].id:'Sky'),date:todayStr(),time:'09:00',pay:'cash',paidAmount:(SERVICES[0]?SERVICES[0].price:1500)};

    '<div class="sec-label">收據抬頭 Logo</div><div class="row" style="gap:12px;padding:12px 0;border-bottom:1px solid var(--line)">'+(CLINIC_LOGO?'<img src="'+CLINIC_LOGO+'" style="max-width:120px;max-height:50px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;padding:4px">':'<div style="width:120px;height:50px;border:1.5px dashed var(--mist);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:11px">顯示診所名稱文字</div>')+'<div style="flex:1"><div style="font-weight:700;font-size:13px">收據抬頭圖片</div><div style="font-size:11px;color:var(--slate)">取代收據最上方的「'+esc(CLINIC_INFO.name)+'」文字</div></div><div class="row" style="gap:5px"><label class="btn sm ghost" style="cursor:pointer">上傳<input type="file" accept="image/*" style="display:none" onchange="uploadLogo(this)"></label>'+(CLINIC_LOGO?'<button class="btn sm danger" onclick="clearLogo()">移除</button>':'')+'</div></div>'+

    '<div class="banner info" style="margin-bottom:10px"><span>i</span><div>治療師章依姓名自動產生；若需自訂章面，點下方「上傳」覆蓋。</div></div><div class="sec-label">自訂治療師章（選填）</div>'+tStamps+'</div></div>'+

function uploadStamp(input,key){var file=input.files&&input.files[0];if(!file)return;if(file.size>1.5*1024*1024){showToast('圖片請小於 1.5MB');return;}var reader=new FileReader();reader.onload=function(e){var data=e.target.result;if(key.indexOf('t-')===0)STAMP_T[key.slice(2)]=data;else STAMPS[key]=data;go('receipt');showToast('印章已上傳');};reader.readAsDataURL(file);}
function clearStamp(key){if(key.indexOf('t-')===0)delete STAMP_T[key.slice(2)];else STAMPS[key]='';go('receipt');showToast('已移除印章');}
function uploadLogo(input){var file=input.files&&input.files[0];if(!file)return;if(file.size>1.5*1024*1024){showToast('圖片請小於 1.5MB');return;}var reader=new FileReader();reader.onload=function(e){CLINIC_LOGO=e.target.result;go('receipt');showToast('Logo 已上傳');};reader.readAsDataURL(file);}
function clearLogo(){CLINIC_LOGO='';go('receipt');showToast('已移除 Logo');}

function ensureQRLib(cb){
  if(typeof QRCode!=='undefined'){cb();return;}
  var existing=document.getElementById('__qrlib');
  if(existing){existing.addEventListener('load',function(){cb();});existing.addEventListener('error',function(){cb(true);});return;}
  var s=document.createElement('script');s.id='__qrlib';s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';s.onload=function(){cb();};s.onerror=function(){cb(true);};document.head.appendChild(s);
}
function renderClinicQRs(){

    [['qr-book',L.book],['qr-intake',L.intake]].forEach(function(pair){
      var el=document.getElementById(pair[0]);if(!el)return;el.innerHTML='';
      if(err||typeof QRCode==='undefined'){el.innerHTML='<div style="font-size:11px;color:var(--slate);text-align:center;padding:8px">QR 載入失敗<br>請改用連結</div>';return;}

    });
  });

function __selfCheck(){
  var expected=['login','dashboard','bookings','patients','soap','analytics','payments','payroll','stamptax','retention','education','schedule','packages','receipt','clinic'];
  var missing=expected.filter(function(v){return typeof views[v]!=='function';});
  var fnList=['svcOf','fmtNT','tColor','getPatient','modal','closeModal','showToast','esc','vasHTML','bpHTML','sendLineMsg','syncOne','ensureGCal','renderCal','addBkModal','bkDetail','checkoutModal','doCheckout','receiptHTML','showReceipt','ptDetail','soapCard','painTrendModal','toggleSoap','saveSoap','romBlock','collectRom','topClientsCard','payrollExportModal','reprintReceipt','voidPayment','addEduModal','sendEduModal','saveSched','addLeave','addSvcModal','addPkgModal','tEditModal'];
  var missingFn=fnList.filter(function(f){try{return typeof window[f]!=='function'&&typeof eval(f)!=='function';}catch(e){return true;}});
  if(missing.length||missingFn.length){
    console.warn('缺漏 views:',missing,'缺漏函式:',missingFn);
    return {ok:false,missing:missing,missingFn:missingFn};
  }
  return {ok:true};
}
/* 全域錯誤攔截：任何 onclick / 事件處理函式出錯時，跳友善提示而非靜默壞掉。
   注意：這只能讓「已載入的程式」出錯時不卡死，無法防止前端被竄改（前端本質無法防破解，
   真正的安全防線在後端 token 驗證與限流）。 */
function __safeErrorToast(msg){
  try{
    var t=document.getElementById('sToast');
    if(t){t.textContent='操作發生問題，請重試或重新整理';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
  }catch(e){}
}
function __wrapHandler(fn){
  return function(){
    try{return fn.apply(this,arguments);}
    catch(err){console.error('事件處理錯誤:',err);__safeErrorToast(err&&err.message);}
  };
}
/* 攔截全域未捕捉錯誤（含 onclick 內同步錯誤） */
window.addEventListener('error',function(ev){
  var box=document.getElementById('frame');
  if(box&&(!box.innerHTML||box.innerHTML.length<50)){
    box.innerHTML='<div style="padding:30px;font-family:monospace;font-size:12px;color:#c00;line-height:1.8"><b>JS 錯誤（請截圖回報）：</b><br>'+ (ev.message||'')+'<br>行 '+ev.lineno+'，列 '+ev.colno+'<br><button style="margin-top:14px;padding:8px 16px;border:none;background:#1a4d68;color:#fff;border-radius:8px;cursor:pointer" onclick="location.reload()">重新整理</button></div>';
  }else{
    /* 畫面還在，只是某個操作出錯：給輕量提示，不破壞當前畫面 */
    __safeErrorToast(ev.message);
  }
});
/* 攔截未處理的 Promise 錯誤（非同步：fetch / 行事曆 / LINE 等） */
window.addEventListener('unhandledrejection',function(ev){
  console.error('未處理的非同步錯誤:',ev.reason);
  __safeErrorToast(ev.reason&&ev.reason.message);
});
function __bootApp(){
  if(typeof setFavicon==='function')setFavicon();
  var chk=__selfCheck();
  if(!chk.ok){
    var msg='<div style="padding:30px;font-family:monospace;font-size:13px;line-height:1.9"><b style="color:#c00;font-size:15px">⚠ 自我檢查發現缺漏</b><br><br>';
    if(chk.missing.length)msg+='<b>未定義的頁面：</b><br>'+chk.missing.join('、')+'<br><br>';
    if(chk.missingFn.length)msg+='<b>未定義的函式：</b><br>'+chk.missingFn.join('、')+'<br><br>';
    msg+='<span style="color:#666">這表示某段程式碼有語法錯誤中斷了後續定義，請把瀏覽器 Console（F12）的紅字錯誤回報。</span></div>';
    document.getElementById('frame').innerHTML=msg;
    return;
  }
  var start='login';
  go(start);
}
__bootApp();
</script>
</body>
